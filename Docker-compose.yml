#version: "3" - deprecated

services:
  db:
    # image: postgres:14-alpine — conflict with build
    container_name: gaming_db
    restart: always
    build:
      context: ./db_data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      #- POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    volumes:
      - ./db_data/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db_data/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - ./db_data/seed_hltb.sql:/docker-entrypoint-initdb.d/seed_hltb.sql
      - ./db_data/seed_metacritic_merged.sql:/docker-entrypoint-initdb.d/seed_metacritic_merged.sql
      - ./db_data/csv/hltb_scrap.csv:/docker-entrypoint-initdb.d/csv_file/hltb_scrap.csv
      - ./db_data/csv/metacritic_clean.csv:/docker-entrypoint-initdb.d/csv_file/metacritic_clean.csv
      - ./db_data/csv/metacritic_merged_local.csv:/docker-entrypoint-initdb.d/csv_file/metacritic_merged_local.csv
      - ${MOUNT_PATH}/db_data/backup/postgresql_data_vol:/db_data/db
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - POSTGRES_HOST=gaming_db
    container_name: py_gaming_app
    build:
      context : ./app
      dockerfile: Dockerfile
    #image: binardino/gaming_of_a_lifetime:latest
    restart: always
    ports:
      - "${STAPP_PORT}:${STAPP_PORT}"

volumes:
  db:
    driver : local
